<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Currency Converter</title>
    <link rel="stylesheet" href="currency.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div class="container">
      <h2>Currency Converter</h2>
      <form>
        <div class="amount">
          <h4>Enter Amount</h4>
          <input type="text" value="100" placeholder="Enter Amount" />
        </div>
        <div class="dropdown">
          <div class="from">
            <p>From</p>
            <div class="select-container">
              <img src="https://flagsapi.com/US/flat/64.png" alt="Flags" />
              <select name="from" title="From Currency" id="from-currency"></select>
            </div>
          </div>

          <i class="fa-solid fa-right-left"></i>

          <div class="to">
            <p>To</p>
            <div class="select-container">
              <img src="https://flagsapi.com/PK/flat/64.png" alt="Flags" />
              <select name="to" title="To Currency" id="to-currency"></select>
            </div>
          </div>
        </div>
        <div class="msg">1USD = 280PKR</div>
        <button type="button">Get Exchange Rate</button>
      </form>
    </div>

    <script src="codes.js"></script>
    <script src="currency.js"></script>
  </body>
</html>
